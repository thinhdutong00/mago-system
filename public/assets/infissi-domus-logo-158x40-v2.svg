<svg xmlns="http://www.w3.org/2000/svg" width="158" height="40" viewBox="0 0 158 40" fill="none" role="img" aria-label="Infissi Domus logo">
  <title>Infissi Domus</title>

  <!-- Icona compatta casa + infisso -->
  <g transform="translate(2 4)">
    <!-- profilo casa -->
    <path d="M4 27V12.5L16 4L28 12.5V27" 
          stroke="#1F2933" stroke-width="3.8" stroke-linecap="square" stroke-linejoin="miter"/>
    <path d="M4 27H10" stroke="#1F2933" stroke-width="3.8" stroke-linecap="square"/>
    <path d="M22 27H28" stroke="#1F2933" stroke-width="3.8" stroke-linecap="square"/>

    <!-- finestra/infisso interno -->
    <rect x="9.2" y="14" width="13.6" height="13" stroke="#007C72" stroke-width="3" fill="none"/>
    <path d="M16 14V27" stroke="#007C72" stroke-width="2"/>
    <path d="M9.2 20.5H22.8" stroke="#007C72" stroke-width="2"/>

    <!-- piccolo taglio del tetto per dare carattere -->
    <path d="M15.2 4.8L16 3.2L16.8 4.8" stroke="white" stroke-width="1.1" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <g font-family="Montserrat, Poppins, Arial, Helvetica, sans-serif" font-weight="800" font-size="14.2" letter-spacing="1.1">
    <text x="41" y="25" fill="#1F2933">INFISSI</text>
    <text x="101" y="25" fill="#007C72">DOMUS</text>
  </g>
</svg>
